site_name: Мой греческий
site_description: Персональная вики по изучению новогреческого языка
exclude_docs: |
  page-templates/**

theme:
  name: material
  language: ru
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Светлая тема

plugins:
  - search:
      lang:
        - ru
        - en

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Главная: index.md
  - Маршрут обучения: learning-path.md
  - Уроки:
      - lessons/index.md
      - Урок 01 — алфавит и приветствия: lessons/lesson-01-alphabet-and-greetings.md
      - Урок 02 — είμαι, знакомство и происхождение: lessons/lesson-02-eimai-and-origin.md
      - Урок 03 — местоимения и знакомство в классе: lessons/lesson-03-pronouns-and-classroom-dialogue.md
      - Урок 04 — числа и место жительства: lessons/lesson-04-numbers-and-residence.md
      - Урок 05 — Τι κάνεις; и глаголы первого спряжения: lessons/lesson-05-ti-kaneis-and-verbs-a.md
      - Урок 06 — числа 11–100, анкета и предлоги: lessons/lesson-06-numbers-and-prepositions.md
  - Справочник:
      - reference/index.md
      - Как читать транскрипцию: reference/transcription.md
      - Алфавит и чтение: reference/alphabet-and-reading.md
      - Приветствия и знакомство: reference/greetings-and-introductions.md
      - Числа от 0 до 10: reference/numbers-0-10.md
      - Числа от 11 до 100: reference/numbers-11-100.md
      - Грамматика: reference/grammar/index.md
      - Глагол είμαι — «быть»: reference/grammar/eimai.md
      - Личные местоимения: reference/grammar/personal-pronouns.md
      - Происхождение и место жительства: reference/grammar/origin-and-residence.md
      - Настоящее время, первое спряжение: reference/grammar/present-tense-a.md
      - Предлоги с винительным: reference/grammar/prepositions-accusative.md
  - Словарь:
      - vocabulary/index.md
      - Общий словарь: vocabulary/all.md
      - Урок 01 — новые слова: vocabulary/lesson-01.md
      - Урок 02 — новые слова: vocabulary/lesson-02.md
      - Урок 03 — новые слова: vocabulary/lesson-03.md
      - Урок 04 — новые слова: vocabulary/lesson-04.md
      - Урок 05 — новые слова: vocabulary/lesson-05.md
      - Урок 06 — новые слова: vocabulary/lesson-06.md
  - Коротко для памяти:
      - memory/index.md
      - Урок 01: memory/lesson-01.md
      - Урок 02: memory/lesson-02.md
      - Урок 03: memory/lesson-03.md
      - Урок 04: memory/lesson-04.md
      - Урок 05: memory/lesson-05.md
      - Урок 06: memory/lesson-06.md
  - Практика:
      - Домашние задания:
          - homework/index.md
          - К уроку 01: homework/lesson-01-alphabet.md
          - К уроку 02: homework/lesson-02-listening-and-stress.md
          - К уроку 03: homework/lesson-03-pronouns-and-eimai.md
          - К уроку 04: homework/lesson-04-eimai-residence-and-numbers.md
          - К уроку 05: homework/lesson-05-verbs-and-matching.md
          - К уроку 06: homework/lesson-06-about-me-and-verbs.md
      - Тренажёры:
          - training/index.md
          - Буквы и буквосочетания: training/alphabet-and-combinations.md
          - είμαι и личные местоимения: training/eimai-and-pronouns.md
          - Слова по урокам: training/vocabulary.md
          - Числа: training/numbers.md
          - Предлоги и винительный: training/accusative-after-apo-se.md
          - Приветствия и знакомство: training/greetings.md
